name: Lezat Release

# Builds unsigned installers for macOS (arm64), Windows (x64), and Linux (x64).
# Runs on manual dispatch or when a v* tag is pushed. Artifacts attach to the
# matching GitHub Release (draft created if it doesn't exist), or download them
# from the workflow run if no tag was pushed.
#
# No secrets required — produces ad-hoc / unsigned binaries. When you're ready
# for signed + notarized Mac builds and Azure-signed Windows MSIs, wire the
# existing build.yml (from upstream Handy) into this workflow with
# sign-binaries: true and supply the APPLE_* / Azure secrets.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --bundles dmg --target aarch64-apple-darwin
            asset-glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles msi
            # Windows redirects CARGO_TARGET_DIR to C:\t (see "Shorten build
            # path" step) to avoid MAX_PATH issues in whisper.cpp's cmake build.
            asset-glob: C:/t/release/bundle/msi/*.msi
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: --bundles deb
            asset-glob: src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.platform }}

    env:
      LEZAT_AI_STUB: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libasound2-dev libopenblas-dev libx11-dev \
            libxtst-dev libxrandr-dev \
            libgtk-layer-shell0 libgtk-layer-shell-dev cmake

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-noble.list \
            https://packages.lunarg.com/vulkan/1.3.290/lunarg-vulkan-1.3.290-noble.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk mesa-vulkan-drivers

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      # whisper-rs-sys cmake paths can exceed Windows MAX_PATH. Redirect target.
      - name: Shorten build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Install frontend deps
        run: bun install

      - name: Build
        run: bun run tauri build ${{ matrix.args }}

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: lezat-transcript-${{ matrix.target }}
          path: ${{ matrix.asset-glob }}
          if-no-files-found: error

      - name: Attach to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset-glob }}
          draft: true
          generate_release_notes: true
